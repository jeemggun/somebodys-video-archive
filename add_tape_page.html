<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Tape | Somebody's Video Archive</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Courier New", monospace;
      color: #28302b;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 159, 28, 0.16), transparent 34%),
        linear-gradient(135deg, #1a0f0a 0%, #2b1810 48%, #100807 100%);
      padding: 36px 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.025) 0px,
        rgba(255,255,255,0.025) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: 0.5;
      pointer-events: none;
    }

    .top-bar {
      position: relative;
      z-index: 2;
      width: min(980px, 96vw);
      margin: 0 auto 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff8ea;
    }

    .brand {
      font-family: Georgia, serif;
      font-size: clamp(22px, 3vw, 34px);
      text-shadow: 0 0 12px rgba(255, 79, 163, 0.85);
    }

    .back-link {
      color: #fff8ea;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.45);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
    }

    .layout {
      position: relative;
      z-index: 2;
      width: min(980px, 96vw);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 28px;
      align-items: stretch;
    }

    .spine {
      min-height: 690px;
      border-radius: 10px;
      background: linear-gradient(180deg, #101211, #2d302c 50%, #0d0f0e);
      border: 4px solid #070807;
      box-shadow: 0 22px 45px rgba(0,0,0,0.45), inset 0 0 0 2px rgba(255,255,255,0.08);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .spine-window {
      height: 88px;
      border-radius: 4px;
      background: #0b0c0b;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.05);
    }

    .spine-label {
      flex: 1;
      margin: 22px 10px;
      border-radius: 8px;
      background: #f5ecd5;
      border: 1px solid #d7c9a9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .spine-title {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #343a34;
      text-transform: uppercase;
      text-align: center;
      max-height: 440px;
    }

    .spine-status {
      display: grid;
      gap: 4px;
      font-size: 12px;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
    }

    .spine-status span {
      padding: 6px 8px;
      border-radius: 2px;
      background: #f47b20;
      text-align: center;
    }

    .spine-status span:last-child {
      background: #7d8b62;
    }

    .cover {
      min-height: 690px;
      border-radius: 10px;
      background:
        linear-gradient(90deg, transparent 0 50%, rgba(255,255,255,0.35) 50% 51%, transparent 51%),
        #f4ecd8;
      border: 2px solid #e4d8bb;
      box-shadow: 0 22px 55px rgba(0,0,0,0.45);
      position: relative;
      overflow: hidden;
      padding: 36px 42px 34px;
    }

    .cover::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(45,48,43,0.08) 1px, transparent 1px);
      background-size: 12px 12px;
      opacity: 0.35;
      pointer-events: none;
    }

    .rainbow {
      position: absolute;
      top: 120px;
      left: -12px;
      width: 360px;
      height: 270px;
      border-top-right-radius: 160px;
      border: 18px solid #849064;
      border-left: 0;
      border-bottom: 0;
      pointer-events: none;
    }

    .rainbow::before,
    .rainbow::after {
      content: "";
      position: absolute;
      border-top-right-radius: 140px;
      border-left: 0;
      border-bottom: 0;
      pointer-events: none;
    }

    .rainbow::before {
      top: 26px;
      left: 0;
      width: 312px;
      height: 232px;
      border: 16px solid #f47b20;
      border-left: 0;
      border-bottom: 0;
    }

    .rainbow::after {
      top: 76px;
      left: 0;
      width: 228px;
      height: 166px;
      border: 16px solid #8ecfc0;
      border-left: 0;
      border-bottom: 0;
      box-shadow: 0 -28px 0 -10px #ffb01f, 0 -56px 0 -10px #f0b77d;
    }

    .cover-content {
      position: relative;
      z-index: 2;
    }

    .cover-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 62px;
    }

    .logo-mark {
      width: 128px;
      height: 58px;
      border-radius: 50%;
      background: #2f3a31;
      color: #f4ecd8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .duration {
      font-size: 24px;
      font-weight: 900;
      color: #495044;
    }

    .big-number {
      font-size: clamp(72px, 11vw, 140px);
      line-height: 0.8;
      font-weight: 900;
      color: #333a34;
      letter-spacing: -0.08em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 20px;
      margin-top: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      color: #5c5f51;
    }

    input,
    select,
    textarea {
      width: 100%;
      font-family: "Courier New", monospace;
      font-size: 15px;
      color: #28302b;
      background: rgba(255,255,255,0.42);
      border: 0;
      border-bottom: 2px solid #333a34;
      padding: 10px 8px;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .full {
      grid-column: 1 / -1;
    }

    .ott-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .ott-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(132,144,100,0.14);
      border: 1px solid rgba(51,58,52,0.22);
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
    }

    .ott-chip input {
      width: auto;
      accent-color: #f47b20;
    }

    .save-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 26px;
      border-top: 5px double #333a34;
      padding-top: 18px;
    }

    .quality {
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .save-btn {
      font-family: "Courier New", monospace;
      font-size: 16px;
      font-weight: 900;
      color: #f4ecd8;
      background: #2f3a31;
      border: 0;
      padding: 14px 22px;
      cursor: pointer;
      box-shadow: 5px 5px 0 #f47b20;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .save-btn:hover {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 #f47b20;
    }

    .saved-note {
      margin-top: 16px;
      min-height: 20px;
      color: #f47b20;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .spine {
        min-height: 150px;
        flex-direction: row;
      }

      .spine-label {
        margin: 10px 18px;
      }

      .spine-title {
        writing-mode: horizontal-tb;
        transform: none;
        font-size: 20px;
      }

      .cover {
        padding: 30px 24px;
      }

      .form-grid,
      .ott-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <div class="brand">Somebody's Video Archive</div>
    <a class="back-link" href="index.html">← MAIN MENU</a>
  </header>

  <main class="layout">
    <aside class="spine" aria-label="VHS spine preview">
      <div class="spine-window"></div>
      <div class="spine-label">
        <div class="spine-title" id="spineTitle">UNTITLED TAPE</div>
      </div>
      <div class="spine-status">
        <span id="spineStatus">VIDEO</span>
        <span>CASSETTE</span>
      </div>
    </aside>

    <section class="cover" aria-label="Add tape form">
      <div class="rainbow"></div>
      <div class="cover-content">
        <div class="cover-head">
          <div class="logo-mark">MANTX</div>
          <div class="duration">◂ 246 m</div>
        </div>

        <div class="big-number">120</div>
        <div class="subtitle">Video Cassette / Add Tape</div>

        <form id="tapeForm">
          <div class="form-grid">
            <div class="full">
              <label for="title">Title</label>
              <input id="title" name="title" type="text" placeholder="e.g. Before Sunrise" autocomplete="off" />
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status" name="status">
                <option>Now Playing</option>
                <option>Watched</option>
                <option>Wishlist</option>
              </select>
            </div>

            <div>
              <label for="type">Type</label>
              <select id="type" name="type">
                <option>Movie</option>
                <option>Series</option>
                <option>Documentary</option>
                <option>Animation</option>
              </select>
            </div>

            <div>
              <label for="rating">Rating</label>
              <select id="rating" name="rating">
                <option>★★★★★</option>
                <option>★★★★☆</option>
                <option>★★★☆☆</option>
                <option>★★☆☆☆</option>
                <option>★☆☆☆☆</option>
                <option>Not Rated Yet</option>
              </select>
            </div>

            <div>
              <label for="year">Year</label>
              <input id="year" name="year" type="text" placeholder="e.g. 1995" />
            </div>

            <div class="full">
              <label>Available On</label>
              <div class="ott-list">
                <label class="ott-chip"><input type="checkbox" value="Netflix" /> Netflix</label>
                <label class="ott-chip"><input type="checkbox" value="Disney+" /> Disney+</label>
                <label class="ott-chip"><input type="checkbox" value="TVING" /> TVING</label>
                <label class="ott-chip"><input type="checkbox" value="Wavve" /> Wavve</label>
                <label class="ott-chip"><input type="checkbox" value="Watcha" /> Watcha</label>
                <label class="ott-chip"><input type="checkbox" value="Coupang Play" /> Coupang Play</label>
                <label class="ott-chip"><input type="checkbox" value="Prime Video" /> Prime Video</label>
                <label class="ott-chip"><input type="checkbox" value="Apple TV+" /> Apple TV+</label>
                <label class="ott-chip"><input type="checkbox" value="YouTube" /> YouTube</label>
              </div>
            </div>

            <div class="full">
              <label for="memo">Memo</label>
              <textarea id="memo" name="memo" placeholder="Write a short note about this tape."></textarea>
            </div>
          </div>

          <div class="save-row">
            <div class="quality">Ultra High Quality</div>
            <button class="save-btn" type="submit">SAVE TAPE</button>
          </div>
          <div class="saved-note" id="savedNote"></div>
        </form>
      </div>
    </section>
  </main>

  <script>
    const titleInput = document.getElementById('title');
    const statusInput = document.getElementById('status');
    const spineTitle = document.getElementById('spineTitle');
    const spineStatus = document.getElementById('spineStatus');
    const form = document.getElementById('tapeForm');
    const savedNote = document.getElementById('savedNote');

    function updatePreview() {
      const title = titleInput.value.trim() || 'UNTITLED TAPE';
      spineTitle.textContent = title;
      spineStatus.textContent = statusInput.value.toUpperCase();
    }

    titleInput.addEventListener('input', updatePreview);
    statusInput.addEventListener('change', updatePreview);

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      const selectedOtt = Array.from(document.querySelectorAll('.ott-chip input:checked'))
        .map(input => input.value);

      const tape = {
        title: titleInput.value.trim(),
        status: statusInput.value,
        type: document.getElementById('type').value,
        rating: document.getElementById('rating').value,
        year: document.getElementById('year').value.trim(),
        availableOn: selectedOtt,
        memo: document.getElementById('memo').value.trim()
      };

      console.log('Saved tape preview:', tape);
      savedNote.textContent = 'Tape saved locally later. For now, this is a preview.';
    });
  </script>
</body>
</html>
