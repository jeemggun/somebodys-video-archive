<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Somebody's Video Archive</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "Courier New", monospace;
      color: #fff;
      background:
        radial-gradient(circle at center, rgba(255, 120, 190, 0.13), transparent 34%),
        linear-gradient(135deg, #1a0f0a 0%, #2b1810 45%, #100807 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.23;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.025) 0px,
        rgba(255,255,255,0.025) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: overlay;
      opacity: 0.4;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 42px;
      padding: 40px 20px;
    }

    .shelves {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.23;
      filter: blur(1px);
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 10px;
      padding: 120px 8vw 70px;
      pointer-events: none;
    }

    .tape-spine {
      border-radius: 4px;
      background: linear-gradient(180deg, #151515, #3b2b24);
      border-left: 4px solid rgba(255,255,255,0.35);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .tape-spine:nth-child(3n) { border-left-color: #ff4fa3; }
    .tape-spine:nth-child(4n) { border-left-color: #00e5ff; }
    .tape-spine:nth-child(5n) { border-left-color: #f8d84a; }

    .neon-sign {
      font-family: Georgia, serif;
      font-size: clamp(34px, 5vw, 76px);
      font-weight: 400;
      letter-spacing: 0.03em;
      color: #fff7fb;
      text-shadow:
        0 0 5px #fff,
        0 0 12px #ff4fa3,
        0 0 26px #ff4fa3,
        0 0 48px rgba(255, 79, 163, 0.75);
      animation: neonFlicker 5s infinite;
      text-align: center;
    }

    @keyframes neonFlicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.82; }
    }

    .tv-wrapper {
      position: relative;
      width: min(780px, 92vw);
      aspect-ratio: 1.35 / 1;
      border-radius: 42px;
      background: linear-gradient(145deg, #46312a, #17100e 62%, #060403);
      padding: clamp(22px, 4vw, 42px);
      box-shadow:
        0 34px 80px rgba(0,0,0,0.62),
        inset 0 0 0 2px rgba(255,255,255,0.08),
        inset 0 -16px 25px rgba(0,0,0,0.55);
    }

    .tv-wrapper::before {
      content: "";
      position: absolute;
      left: 13%;
      right: 13%;
      bottom: -34px;
      height: 34px;
      background: linear-gradient(180deg, #140d0b, #060403);
      border-radius: 0 0 20px 20px;
      box-shadow: 0 15px 26px rgba(0,0,0,0.45);
    }

    .tv-screen {
      position: relative;
      height: 100%;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(71, 124, 255, 0.35), transparent 48%),
        linear-gradient(180deg, #071b8d 0%, #06105f 100%);
      border: 9px solid #0a0706;
      box-shadow:
        inset 0 0 36px rgba(0,0,0,0.9),
        inset 0 0 80px rgba(255,255,255,0.06),
        0 0 0 1px rgba(255,255,255,0.11);
    }

    .tv-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.06) 0px,
        rgba(255,255,255,0.06) 1px,
        transparent 1px,
        transparent 5px
      );
      opacity: 0.45;
      pointer-events: none;
    }

    .tv-screen::after {
      content: "";
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle, transparent 54%, rgba(0,0,0,0.42) 86%);
      pointer-events: none;
    }

    .menu {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(28px, 6vw, 72px);
      color: #f8f8ff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
    }

    .menu-title {
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: 0.18em;
      margin-bottom: 30px;
    }

    .menu-list {
      list-style: none;
      width: 100%;
      max-width: 420px;
    }

    .menu-list li {
      font-size: clamp(18px, 2.4vw, 30px);
      line-height: 1.55;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: transform 0.18s ease, color 0.18s ease, text-shadow 0.18s ease;
      user-select: none;
    }

    .menu-list li:hover {
      transform: translateX(10px);
      color: #b9fff7;
      text-shadow:
        0 0 7px rgba(185,255,247,0.9),
        2px 2px 0 rgba(0,0,0,0.35);
    }

    .divider {
      width: 100%;
      max-width: 410px;
      margin: 16px 0 14px;
      border-top: 2px dashed rgba(255,255,255,0.65);
    }

    .add-tape {
      color: #f8d84a;
    }

    .add-tape:hover {
      color: #fff2a6 !important;
      text-shadow:
        0 0 8px rgba(248,216,74,0.95),
        0 0 18px rgba(248,216,74,0.55) !important;
    }

    .tv-controls {
      position: absolute;
      right: 34px;
      bottom: 28px;
      display: flex;
      gap: 12px;
      opacity: 0.72;
    }

    .knob {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(145deg, #6b5a51, #17100e);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.7);
    }

    @media (max-width: 640px) {
      body { overflow: auto; }
      .page { gap: 28px; justify-content: flex-start; padding-top: 72px; }
      .tv-wrapper { aspect-ratio: 0.92 / 1; border-radius: 30px; }
      .menu { padding: 32px 24px; }
      .menu-list li { line-height: 1.7; }
      .tv-controls { right: 28px; bottom: 22px; }
    }
  </style>
</head>
<body>
  <div class="shelves" aria-hidden="true">
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
    <div class="tape-spine"></div><div class="tape-spine"></div><div class="tape-spine"></div>
  </div>

  <main class="page">
    <h1 class="neon-sign">Somebody's Video Archive</h1>

    <section class="tv-wrapper" aria-label="VHS main menu">
      <div class="tv-screen">
        <nav class="menu">
          <div class="menu-title">MAIN MENU</div>
          <ul class="menu-list">
            <li onclick="fakeMove('Now Playing')">&gt; NOW PLAYING</li>
            <li onclick="fakeMove('Watched')">&gt; WATCHED</li>
            <li onclick="fakeMove('Wishlist')">&gt; WISHLIST</li>
            <li onclick="fakeMove('New Arrivals')">&gt; NEW ARRIVALS</li>
            <li onclick="fakeMove('Awards')">&gt; AWARDS</li>
          </ul>
          <div class="divider"></div>
          <ul class="menu-list">
            <li class="add-tape" onclick="location.href='add-tape.html'">&gt; + ADD TAPE</li>
          </ul>
        </nav>
      </div>
      <div class="tv-controls" aria-hidden="true">
        <span class="knob"></span>
        <span class="knob"></span>
      </div>
    </section>
  </main>

  <script>
    function fakeMove(sectionName) {
      alert(sectionName + " page will open here later.");
    }
  </script>
</body>
</html>
